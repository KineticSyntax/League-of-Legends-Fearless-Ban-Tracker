<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fearless Ban Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/img/LoL.png"> 
</head>
<body>

  <div class="container">
    <header>
      <div class="subtitle">LEAGUE OF LEGENDS FEARLESS BAN TRACKER</div>
      <h1>CHAMPION ROSTER</h1>
      <div class="divider"></div>
    </header>

    <div class="controls">
      <div class="top-controls">
        <input id="search" placeholder="Search champions…" />
        <div class="tag-filters">
          <div class="tag-filter-dropdown">
            <button id="tagDropdownBtn">Filter by Tags ▼</button>
            <div id="tagDropdownMenu" class="dropdown-menu hidden">
              <!-- Tag checkboxes will be generated here -->
            </div>
          </div>
        </div>
        <button id="toggleDeleted">BANNED (0)</button>
        <button id="restoreAll" class="restore hidden">RESTORE ALL</button>
      </div>

      <div class="role-filters">
        <button class="role-btn" data-role="Top">Top</button>
        <button class="role-btn" data-role="Jungle">Jg</button>
        <button class="role-btn" data-role="Mid">Mid</button>
        <button class="role-btn" data-role="ADC">ADC</button>
        <button class="role-btn" data-role="Support">Sup</button>
      </div>
    </div>

    <div class="stats">
      <span id="statusText">0 ACTIVE</span>
      <span id="remainingText"></span>
    </div>

    <div id="champGrid" class="grid"></div>

    <div id="deletedSection" class="deleted-section hidden">
      <div id="deletedList" class="deleted-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
